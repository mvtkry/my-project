name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile "unievents dashboard V0/unievents-dashboard/main.py"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: program
          path: dist/*.exe
          
